name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve app version
        run: |
          ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          echo "CLIPARR_VERSION=${ref_name}@${GITHUB_SHA::7}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Knip
        run: pnpm knip

      - name: Test
        run: pnpm test

      - name: Docs check
        run: pnpm docs:check

      - name: Build
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm build
