name: Docker

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/techsquidtv/cliparr
  IMAGE_DESCRIPTION: Instant media clipper for Plex and Jellyfin servers.

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=beta,enable=${{ github.ref_type == 'tag' && contains(github.ref_name, '-beta.') }}
            type=raw,value=rc,enable=${{ github.ref_type == 'tag' && contains(github.ref_name, '-rc.') }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Cliparr
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
          annotations: |
            org.opencontainers.image.title=Cliparr
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Resolve app version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            version="${ref_name}@${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          pull: true
          load: true
          build-args: |
            CLIPARR_VERSION=${{ steps.version.outputs.value }}
          tags: cliparr:smoke
          cache-from: type=gha

      - name: Smoke test image
        run: |
          set -euo pipefail

          health_file="${RUNNER_TEMP}/cliparr-health.json"
          index_file="${RUNNER_TEMP}/cliparr-index.html"

          docker run \
            --detach \
            --name cliparr-smoke \
            --publish 7171:7171 \
            --env APP_KEY="cliparr-smoke-test-key-with-at-least-32-characters" \
            --volume cliparr-smoke-data:/data \
            cliparr:smoke

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:7171/api/health > "${health_file}"; then
              break
            fi
            sleep 1
          done

          cat "${health_file}"
          grep -q '"status":"ok"' "${health_file}"
          grep -q '"database":"ok"' "${health_file}"

          curl --fail --silent --show-error http://127.0.0.1:7171/ > "${index_file}"
          grep -q '<div id="root"></div>' "${index_file}"

      - name: Show smoke-test logs
        if: failure()
        run: docker logs cliparr-smoke || true

      - name: Stop smoke-test container
        if: always()
        run: |
          docker rm -f cliparr-smoke || true
          docker volume rm cliparr-smoke-data || true

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: false
          build-args: |
            CLIPARR_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
