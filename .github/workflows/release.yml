name: Release

on:
  workflow_dispatch:
    inputs:
      rc:
        description: Create as Release Candidate (pre-release)
        required: true
        default: false
        type: boolean
      dry_run:
        description: Plan, check, and generate notes without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/techsquidtv/cliparr
  IMAGE_DESCRIPTION: Instant media clipper for Plex and Jellyfin servers.

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Require main branch
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Releases must run from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Plan release
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANNEL="stable"
          if [[ "${{ inputs.rc }}" == "true" ]]; then
            CHANNEL="rc"
          fi

          node tools/release/plan-release.mjs \
            --channel "${CHANNEL}" \
            --target "${GITHUB_SHA}" \
            --image-name "${IMAGE_NAME}" \
            --github-output

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Knip
        run: pnpm knip

      - name: Test
        run: pnpm test

      - name: Docs check
        run: pnpm docs:check

      - name: Build
        env:
          CLIPARR_VERSION: ${{ steps.plan.outputs.tag }}
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/prod.Dockerfile
          platforms: linux/amd64
          pull: true
          load: true
          build-args: |
            CLIPARR_VERSION=${{ steps.plan.outputs.tag }}
          tags: cliparr:smoke
          cache-from: type=gha

      - name: Smoke test image
        run: |
          set -euo pipefail

          health_file="${RUNNER_TEMP}/cliparr-health.json"
          index_file="${RUNNER_TEMP}/cliparr-index.html"

          docker run \
            --detach \
            --name cliparr-smoke \
            --publish 7171:7171 \
            --env APP_KEY="cliparr-smoke-test-key-with-at-least-32-characters" \
            --volume cliparr-smoke-data:/data \
            cliparr:smoke

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:7171/api/health > "${health_file}"; then
              break
            fi
            sleep 1
          done

          cat "${health_file}"
          grep -q '"status":"ok"' "${health_file}"
          grep -q '"database":"ok"' "${health_file}"
          grep -q '"version":"${{ steps.plan.outputs.tag }}"' "${health_file}"

          curl --fail --silent --show-error http://127.0.0.1:7171/ > "${index_file}"
          grep -q '<div id="root"></div>' "${index_file}"

      - name: Show smoke-test logs
        if: failure()
        run: docker logs cliparr-smoke || true

      - name: Stop smoke-test container
        if: always()
        run: |
          docker rm -f cliparr-smoke || true
          docker volume rm cliparr-smoke-data || true

      - name: Validate release secrets
        if: ${{ !inputs.dry_run }}
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_PAGES_DEPLOY_HOOK_URL}" ]]; then
            echo "CLOUDFLARE_PAGES_DEPLOY_HOOK_URL is required for publishing releases." >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: publish
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/prod.Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ !inputs.dry_run }}
          build-args: |
            CLIPARR_VERSION=${{ steps.plan.outputs.tag }}
          tags: ${{ steps.plan.outputs.docker_tags }}
          labels: |
            org.opencontainers.image.title=Cliparr
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.plan.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          annotations: |
            org.opencontainers.image.title=Cliparr
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write Docker tags file
        run: |
          printf '%s\n' "${{ steps.plan.outputs.docker_tags }}" > "${RUNNER_TEMP}/docker-tags.txt"

      - name: Create GitHub release
        id: github-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(
            --repository "${GITHUB_REPOSITORY}"
            --tag "${{ steps.plan.outputs.tag }}"
            --target "${GITHUB_SHA}"
            --previous-tag "${{ steps.plan.outputs.previous_tag }}"
            --name "${{ steps.plan.outputs.release_name }}"
            --image-name "${IMAGE_NAME}"
            --image-digest "${{ steps.publish.outputs.digest }}"
            --docker-tags-file "${RUNNER_TEMP}/docker-tags.txt"
          )

          if [[ "${{ steps.plan.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi

          node tools/release/create-github-release.mjs "${args[@]}"

      - name: Trigger Cloudflare Pages rebuild
        if: ${{ !inputs.dry_run }}
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "${CLOUDFLARE_PAGES_DEPLOY_HOOK_URL}"
